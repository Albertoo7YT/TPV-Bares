<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burger House TPV - Offline</title>
    <meta name="theme-color" content="#f59e0b" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(245, 158, 11, 0.18), transparent 30%),
          linear-gradient(180deg, #1c1917 0%, #09090b 100%);
        color: #f5f5f4;
      }

      main {
        width: min(92vw, 420px);
        padding: 32px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0;
        color: #d6d3d1;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sin conexion</h1>
      <p>
        Burger House TPV no puede cargar esta pantalla ahora mismo. Cuando vuelva la conexion,
        actualiza la app y continua el servicio.
      </p>
    </main>
  </body>
</html>
