# Nginx virtual host para servir el frontend del TPV y enrutar la API/WebSocket
server {
    listen 80;
    server_name tpv.tudominio.com;  # Placeholder: sustituir por el dominio real

    # Redirección HTTP -> HTTPS.
    # Se deja comentada hasta obtener el certificado con Certbot.
    # Tras ejecutar Certbot, este bloque puede activarse o Certbot lo añadirá/modificará automáticamente.
    # return 301 https://$server_name$request_uri;

    # Directorio público donde se desplegará el build estático de Vite.
    root /var/www/tpv/client;
    index index.html;

    # Frontend SPA:
    # si el archivo solicitado no existe, Nginx devuelve index.html
    # para que React Router resuelva la ruta en el cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresiva para assets versionados generados por Vite.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy de la API HTTP al backend Node.js/Express.
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket para Socket.IO.
    # Mantiene cabeceras de upgrade y timeout largo para conexiones persistentes.
    location /socket.io {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Cabeceras básicas de seguridad.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Compresión gzip para respuestas de texto y recursos habituales.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}

# Nota HTTPS con Certbot:
# 1. El dominio debe resolver ya hacia la IP pública del VPS.
# 2. Ejecuta Certbot sobre este host virtual para que emita el certificado.
# 3. Certbot suele modificar esta configuración automáticamente para añadir listen 443,
#    certificados, redirección a HTTPS y parámetros SSL recomendados.
